<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Test</title>
</head>
<body>

  <h1>មើលលទ្ធផលនៅក្នុង Console</h1>

  <script>
    const str = "JavaScript";
    let reversedStr = "";

    for (let i = str.length - 1; i >= 0; i--) {
      reversedStr += str[i];
    }
    console.log(reversedStr); // លទ្ធផលនឹងលោតក្នុង Console
  </script>

</body>
</html>
